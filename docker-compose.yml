version: '3.8'

services:

  # 🔹 Backend (FastAPI)
  backend:
    build: ./backend
    container_name: ndtp-backend
    ports:
      - "8001:8000"
    depends_on:
      - neo4j
    environment:
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USER=neo4j
      - NEO4J_PASSWORD=password
    volumes:
      - ./backend/data:/app/data

  # 🔹 Neo4j
  neo4j:
    image: neo4j:5
    container_name: neo4j_ndtp
    environment:
      - NEO4J_AUTH=neo4j/password
    ports:
      - "7474:7474"
      - "7687:7687"
    volumes:
      - neo4j_data:/data

  # 🔹 Jenkins
  jenkins:
    image: jenkins/jenkins:lts-jdk17
    container_name: jenkins_ndtp
    ports:
      - "8081:8080"
      - "50000:50000"
    volumes:
      - jenkins_home:/var/jenkins_home
      - /var/run/docker.sock:/var/run/docker.sock

  # 🔹 SonarQube
  sonarqube:
    image: sonarqube:lts
    container_name: sonar_ndtp
    ports:
      - "9000:9000"
    environment:
      - SONAR_ES_BOOTSTRAP_CHECKS_DISABLE=true
    volumes:
      - sonar_data:/opt/sonarqube/data

volumes:
  neo4j_data:
  jenkins_home:
  sonar_data: